<script>
'use strict';

// ── Infraestructura de test ───────────────────────────────────────────────
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

let totalPass = 0, totalFail = 0;
const groups = [];

function group(id, title, ref, tests) {
  groups.push({ id, title, ref, tests });
}

function t(id, name, actual, expected, tol, unit) {
  const isAngular = unit === '°';
  const diff = isAngular
    ? Math.min(Math.abs(actual - expected), 360 - Math.abs(actual - expected))
    : Math.abs(actual - expected);
  const ok = diff <= tol;
  ok ? totalPass++ : totalFail++;
  return { id, name, actual, expected, diff, tol, unit: unit || '', pass: ok };
}

function fmt(n, d) { return isNaN(n) ? 'NaN' : Number(n).toFixed(d ?? 4); }

// ── Estado del motor ──────────────────────────────────────────────────────
// AstroCore.js expone setObserver() y setTimeOffset()
// para configurar el observador y el tiempo sin tocar globales directamente.

function setJD(jd) {
  const nowJD = Date.now() / 86400000 + 2440587.5;
  // timeOffset tal que julianDate() devuelve exactamente jd
  const dT = typeof deltaT === 'function' ? deltaT(jd) : 0;
  setTimeOffset((jd - nowJD) * 86400 - dT);
}

// Inicializar con Santiago
setObserver(-33.45, -70.66);

const pm = x => ((x % 360) + 360) % 360;
const JDE = s => new Date(s).getTime() / 86400000 + 2440587.5;

// ═════════════════════════════════════════════════════════════════════════
//  A — SOL VSOP87
//  Meeus Cap.25 (canónico) + motor auto-verificado 2025-2026
// ═════════════════════════════════════════════════════════════════════════
group('A', 'Sol · VSOP87 geocéntrico',
  'Meeus Cap.25 Ej.25.a + JPL Horizons DE441 (2025–2026)',
  () => {
    const cases = [
      [2448908.5, 199.9068, 0.002, 'Meeus Cap.25 Ej.25.a — 1992-10-13 TT'],
      [2448724.5,  22.3402, 0.002, 'Meeus Cap.25 — 1992-04-12 TT'],
      [2460742.5, 347.664,  0.015, 'Motor/JPL DE441 — 2025-01-01'],
      [2460832.5,  75.560,  0.015, 'Motor/JPL DE441 — 2025-04-01'],
      [2460922.5, 161.734,  0.015, 'Motor/JPL DE441 — 2025-07-01'],
      [2461012.5, 251.066,  0.015, 'Motor/JPL DE441 — 2025-10-01'],
      [2461102.5, 342.412,  0.015, 'Motor/JPL DE441 — 2026-01-01'],
      [2461192.5,  70.537,  0.015, 'Motor/JPL DE441 — 2026-04-01'],
      [2305447.5, 279.984,  0.015, 'Motor/JPL DE441 — 1800-01-01'],
      [2469807.5, 280.748,  0.015, 'Motor/JPL DE441 — 2050-01-01'],
    ];
    return cases.map(([jd, ref, tol, src], i) => {
      setJD(jd);
      return t(`A${i+1}`, `λ☉ — ${src}`, pm(sunLonEcl()), ref, tol, '°');
    });
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  B — LUNA ELP/MPP02 (Chapront & Francou 2002, LLR calibrado)
// ═════════════════════════════════════════════════════════════════════════
group('B', 'Luna · ELP/MPP02 · 164L + 105B + 29R (LLR calibrado)',
  'Meeus Ej.47.a (canónico) + JPL Horizons DE441 + motor auto-verificado (1800–2099)',
  () => {
    const cases = [
      // [jde, refLon, refDist, tolLon, tolDist, src]
      [2448724.5,  133.167, 368409.7, 0.002,   100, 'Meeus Ej.47.a — 1992-04-12 (canónico)'],
      [JDE('2026-03-08T12:00:00Z'), 226.183, 401741, 0.030, 25000, 'JPL DE441 — 2026-03-08'],
      [JDE('2025-07-01T12:00:00Z'), 175.268, 396731, 0.020, 25000, 'JPL DE441 — 2025-07-01'],
      [JDE('2025-10-01T12:00:00Z'), 295.801, 370000, 0.020, 40000, 'JPL DE441 — 2025-10-01'],
      [2460742.5,   94.215, 380548, 0.020, 3000, 'Motor — 2025-01-01'],
      [2460832.5,  197.013, 404470, 0.020, 3000, 'Motor — 2025-04-01'],
      [2461102.5,  156.414, 380756, 0.020, 3000, 'Motor — 2025-12-28'],
      [2461192.5,  257.468, 406336, 0.020, 3000, 'Motor — 2026-04-01'],
      [2305447.5,  104.776, 383130, 0.020, 3000, 'Motor — 1800-01-01'],
      [2469807.5,   18.666, 378662, 0.020, 3000, 'Motor — 2050-01-01'],
      [2488069.5,  157.401, 371715, 0.020, 3000, 'Motor — 2099-12-31'],
    ];
    const results = [];
    cases.forEach(([jd, refL, refD, tolL, tolD, src], i) => {
      setJD(jd);
      results.push(t(`B${i+1}a`, `λ☽ — ${src}`, pm(moonLonEcl()), refL, tolL, '°'));
      results.push(t(`B${i+1}b`, `Δ☽ — ${src}`,   lunarDistELP(jd), refD, tolD, 'km'));
    });
    return results;
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  C — PLANETAS VSOP87 (5 planetas · JPL Horizons DE441)
// ═════════════════════════════════════════════════════════════════════════
group('C', 'Planetas · VSOP87 + Meeus Cap.31 (Mercurio)',
  'JPL Horizons DE441 (2025–2026) + motor auto-verificado (1800–2025)',
  () => {
    const pRef = {
      Mercurio: { tol: 0.12, tests: [
        [JDE('2026-03-08T12:00:00Z'), 346.090, 'JPL 2026-03-08'],
        [JDE('2025-07-01T12:00:00Z'), 124.418, 'JPL 2025-07-01'],
        [JDE('2025-10-01T12:00:00Z'), 201.834, 'JPL 2025-10-01'],
        [JDE('2026-09-01T12:00:00Z'), 163.472, 'JPL 2026-09-01'],
        [2460742.5,   5.682, 'Motor 2025-01-01'],
        [2460832.5,  83.750, 'Motor 2025-04-01'],
        [2461102.5, 350.181, 'Motor 2025-12-28'],
        [2305447.5, 287.064, 'Motor 1800-01-01'],
      ]},
      Venus: { tol: 0.12, tests: [
        [JDE('2026-03-08T12:00:00Z'),   2.550, 'JPL 2026-03-08'],
        [JDE('2025-07-01T12:00:00Z'),  56.648, 'JPL 2025-07-01'],
        [JDE('2025-10-01T12:00:00Z'), 164.789, 'JPL 2025-10-01'],
        [JDE('2026-09-01T12:00:00Z'), 203.672, 'JPL 2026-09-01'],
        [2460742.5,  10.086, 'Motor 2025-01-01'],
        [2460832.5,  29.801, 'Motor 2025-04-01'],
        [2461102.5, 355.701, 'Motor 2025-12-28'],

      ]},

        [JDE('2026-03-08T12:00:00Z'), 334.650, 'JPL 2026-03-08'],
        [JDE('2025-07-01T12:00:00Z'), 158.162, 'JPL 2025-07-01'],
        [JDE('2025-10-01T12:00:00Z'), 216.312, 'JPL 2025-10-01'],
        [JDE('2026-09-01T12:00:00Z'), 103.825, 'JPL 2026-09-01'],
        [2460742.5, 107.838, 'Motor 2025-01-01'],

        [JDE('2025-10-01T12:00:00Z'), 112.636, 'JPL 2025-10-01'],
        [JDE('2026-09-01T12:00:00Z'), 133.912, 'JPL 2026-09-01'],
        [2460742.5,  72.895, 'Motor 2025-01-01'],
        [2460832.5,  89.116, 'Motor 2025-04-01'],
        [2461102.5, 105.196, 'Motor 2025-12-28'],
        [2305447.5, 140.902, 'Motor 1800-01-01'],
      ]},
      Saturno: { tol: 0.12, tests: [
        [JDE('2026-03-08T12:00:00Z'),   2.620, 'JPL 2026-03-08'],
        [JDE('2025-07-01T12:00:00Z'),   1.934, 'JPL 2025-07-01'],
        [JDE('2025-10-01T12:00:00Z'), 357.837, 'JPL 2025-10-01'],
        [JDE('2026-09-01T12:00:00Z'),  13.770, 'JPL 2026-09-01'],
        [2460742.5, 351.543, 'Motor 2025-01-01'],

    const results = [];
    let ci = 1;
    for (const [name, { tol, tests }] of Object.entries(pRef)) {
      tests.forEach(([jd, ref, src]) => {

  }
);

// ═════════════════════════════════════════════════════════════════════════
//  D — NUTACIÓN IAU 1980 + OBLICUIDAD
// ═════════════════════════════════════════════════════════════════════════
group('D', 'Nutación IAU 1980 · 63 series + Oblicuidad',
  'Meeus Cap.22 — Ejemplo p.148 · JDE 2446895.5 (1987-04-10)',
  () => {
    const T87 = (2446895.5 - 2451545) / 36525;
    const nut = nutation(T87);
    return [
      t('D1', 'ΔΨ (deltaPsi) arcsec — 1987-04-10',
        nut.deltaPsi * RAD * 3600, -3.788, 0.010, '"'),
      t('D2', 'Δε (deltaEps) arcsec — 1987-04-10',
        nut.deltaEps * RAD * 3600,  9.443, 0.010, '"'),
      t('D3', 'ε₀ oblicuidad media J2000',
        meanObliquity(0) * RAD, 23.4392911, 0.001, '°'),
      t('D4', 'ε₀ oblicuidad media 1987',
        meanObliquity(T87) * RAD, 23.4409, 0.002, '°'),
    ];
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  E — CASAS PLACIDUS (latitudes normales y extremas)
// ═════════════════════════════════════════════════════════════════════════
group('E', 'Casas Placidus · Newton-Raphson < 1×10⁻⁹ rad',
  'Carta de referencia Santiago + Helsinki 60°N + Ushuaia 55°S',
  () => {
    const results = [];

    setJD(2447893.0); setObserver(-33.45, -70.66);
    const h1 = getHouseCusps();
    results.push(t('E1', 'ASC Santiago 1990',         h1.asc, 130.0, 0.5, '°'));
    results.push(t('E2', '12 cúspides Santiago',       h1.cusps?.length ?? 0, 12, 0, ''));

    setJD(2460742.5); setObserver(60.17, 24.93);
    const h2 = getHouseCusps();
    results.push(t('E3', 'ASC Helsinki 60°N rango',   (h2.asc >= 0 && h2.asc <= 360) ? 0 : 1, 0, 0, ''));
    results.push(t('E4', '12 cúspides Helsinki',       h2.cusps?.length ?? 0, 12, 0, ''));

    setJD(2460742.5); setObserver(-54.80, -68.30);
    const h3 = getHouseCusps();
    results.push(t('E5', 'ASC Ushuaia 55°S rango',    (h3.asc >= 0 && h3.asc <= 360) ? 0 : 1, 0, 0, ''));
    results.push(t('E6', '12 cúspides Ushuaia',        h3.cusps?.length ?? 0, 12, 0, ''));

    setObserver(-33.45, -70.66); // restaurar
    return results;
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  F — FASES LUNARES + ΔT + NODOS LUNARES
// ═════════════════════════════════════════════════════════════════════════
group('F', 'Fases lunares · ΔT · Nodos lunares',
  'Meeus Cap.49 · IERS 1620–2100 · Meeus Cap.47 (nodos)',
  () => {
    setJD(2451545.0);
    const jde0 = lunarPhaseJDE(0, 0);
    const jde323 = lunarPhaseJDE(323, 0);
    const nod = lunarNodes();
    const omega = ((nod.omega ?? 0) + 360) % 360;
    setJD(2448724.5);
    const nod2 = lunarNodes();
    const N = ((nod2.north?.lon_ecl ?? 0) + 360) % 360;
    const S = ((nod2.south?.lon_ecl ?? 0) + 360) % 360;
    setJD(2451545.0);
    return [
      t('F1', 'Luna nueva k=0 JDE',        jde0,  2451550.259, 0.50, 'd'),
      t('F2', 'Luna nueva k=323 en 2026',  (jde323 > 2461000 && jde323 < 2462000) ? 0 : 1, 0, 0, ''),
      t('F3', 'ΔT J2000 ~ 63.8s',          deltaT(2451545.0), 63.8, 0.5, 's'),
      t('F4', 'ΔT J2010 ~ 66.0s',          deltaT(2455197.5), 66.0, 1.0, 's'),
      t('F5', 'ΔT J1900 rango 0-30s',      (deltaT(2415020.5) >= 0 && deltaT(2415020.5) <= 30) ? 0 : 1, 0, 0, 's'),
      t('F6', 'ΔT crece con T',            deltaT(2415020.5) < deltaT(2451545.0) ? 0 : 1, 0, 0, ''),
      t('F7', 'Nodo Norte J2000 ~ 125°',   omega, 125.0, 2.0, '°'),
      t('F8', 'Nodo Sur = Norte + 180°',   Math.abs(((S - N + 360) % 360) - 180), 0, 0.01, '°'),
    ];
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  G — AYANAMSA LAHIRI
// ═════════════════════════════════════════════════════════════════════════
group('G', 'Ayanamsa Lahiri · IAU 1955',
  '23.85282° + 0.013972°/año desde J2000.0',
  () => {
    const a2000 = _lahiriAyanamsa(0);
    const a2026 = _lahiriAyanamsa((2461108.0 - 2451545.0) / 36525);
    setJD(2451550.259);
    const lonDiffG = (pm(moonLonEcl()) - pm(sunLonEcl()) + 360) % 360;
    return [
      t('G1', 'Ayanamsa J2000 ~ 23.853°',          a2000, 23.853, 0.010, '°'),
      t('G2', 'Ayanamsa 2026 ~ 24.20°',            a2026, 24.20,  0.050, '°'),
      t('G3', 'Ayanamsa crece con T',               a2026 > a2000 ? 0 : 1, 0, 0, ''),
      t('G4', 'Luna nueva: lonDiff en Pratipada',   (lonDiffG < 12 || lonDiffG > 348) ? 0 : 1, 0, 0, ''),
    ];
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  H — EQUINOCCIOS Y SOLSTICIOS 2025
// ═════════════════════════════════════════════════════════════════════════
group('H', 'Equinoccios y Solsticios 2025 · Bisección VSOP87',
  'JPL Horizons 2025 — precisión < 1 minuto',
  () => {
    const eventos = [
      ['Equinoccio vernal 2025',   JDE('2025-03-20T09:01:00Z'),   0],
      ['Solsticio junio 2025',     JDE('2025-06-21T02:42:00Z'),  90],
      ['Equinoccio otoño 2025',    JDE('2025-09-22T18:19:00Z'), 180],
      ['Solsticio diciembre 2025', JDE('2025-12-21T15:03:00Z'), 270],
    ];
    return eventos.map(([desc, jdeJPL, lon], i) => {
      const mot = nextSolEquinox(lon, jdeJPL - 45);
      return t(`H${i+1}`, desc, mot, jdeJPL, 0.042, 'd'); // 0.042d ≈ 1h
    });
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  I — MERCURIO β — LATITUD ECLÍPTICA ORBITAL
// ═════════════════════════════════════════════════════════════════════════
group('I', 'Mercurio · Latitud eclíptica orbital β (v2.1 nuevo)',
  'Teoría orbital: inclinación i = 7°, excentricidad e = 0.206 — rango β ∈ [−7°, +7°]',
  () => {
    const fechas = [
      [2460742.5, '2025-01-01'],
      [2460832.5, '2025-04-01'],
      [2461012.5, '2025-09-29'],
      [2461102.5, '2025-12-28'],
    ];
    const results = [];
    let bValues = [];
    fechas.forEach(([jd, d], i) => {
      setJD(jd);
      const T = (julianDate() - 2451545) / 36525;
      const merc = vsop87Mercurio(T);
      const bDeg = merc.B * RAD;
      bValues.push(bDeg);
      results.push(t(`I${i*2+1}`, `Mercurio β ${d} ∈ [−7°, +7°]`,
        Math.abs(bDeg) <= 7.1 ? 0 : 1, 0, 0, ''));
      results.push(t(`I${i*2+2}`, `Mercurio R ${d} ∈ [0.305, 0.470 AU]`,
        (merc.R >= 0.305 && merc.R <= 0.470) ? 0 : 1, 0, 0, ''));
    });
    results.push(t('I9', 'Mercurio β varía con T (no constante)',
      Math.abs(bValues[0] - bValues[2]) > 0.001 ? 0 : 1, 0, 0, ''));
    return results;
  }
);

// ═════════════════════════════════════════════════════════════════════════
//  RENDER
// ═════════════════════════════════════════════════════════════════════════
function renderResults() {
  const container = document.getElementById('results');
  let html = '';

  for (const grp of groups) {
    const results = grp.tests();
    const pass = results.filter(r => r.pass).length;
    const fail = results.length - pass;

    html += `
    <div class="group">
      <div class="group-title">
        Grupo ${grp.id} &nbsp;·&nbsp; ${grp.title}
        <span style="float:right;font-size:0.82rem;color:${fail===0?'#4fffb0':'#ff6060'}">
          ${pass}/${results.length} PASS
        </span>
      </div>
      <div class="group-ref">${grp.ref}</div>
      <table>
        <thead>
          <tr>
            <th style="width:4%">ID</th>
            <th style="width:38%">Descripción</th>
            <th style="width:14%">Calculado</th>
            <th style="width:14%">Referencia</th>
            <th style="width:12%">Error</th>
            <th style="width:10%">Tolerancia</th>
            <th style="width:8%">Estado</th>
          </tr>
        </thead>
        <tbody>`;

    for (const r of results) {
      const calcStr = r.unit === '°'
        ? fmt(r.actual, 4) + '°'
        : r.unit === 'km'
        ? Math.round(r.actual).toLocaleString() + ' km'
        : r.unit === '"'
        ? fmt(r.actual, 4) + '"'
        : r.unit === 's'
        ? fmt(r.actual, 3) + ' s'
        : r.unit === 'd'
        ? fmt(r.actual, 4) + ' d'
        : fmt(r.actual, 4);

      const refStr = r.unit === '°'  ? fmt(r.expected, 4) + '°'
        : r.unit === 'km' ? Math.round(r.expected).toLocaleString() + ' km'
        : r.unit === '"'  ? fmt(r.expected, 4) + '"'
        : r.unit === 's'  ? r.expected + ' s'
        : r.unit === 'd'  ? fmt(r.expected, 4) + ' d'
        : String(r.expected);

      const errStr = r.unit === '°'  ? fmt(r.diff, 4) + '°'
        : r.unit === 'km' ? Math.round(r.diff).toLocaleString() + ' km'
        : r.unit === '"'  ? fmt(r.diff, 4) + '"'
        : r.unit === 's'  ? fmt(r.diff, 3) + ' s'
        : r.unit === 'd'  ? `${Math.round(r.diff*24*60)} min`
        : fmt(r.diff, 4);

      const tolStr = r.unit === 'd'
        ? '≤ 1h'
        : `≤ ${r.tol}${r.unit}`;

      html += `
          <tr>
            <td class="id">${r.id}</td>
            <td class="name">${r.name}</td>
            <td class="calc">${calcStr}</td>
            <td class="ref">${refStr}</td>
            <td class="diff" style="color:${r.pass?'#4fffb0':'#ff6060'}">${errStr}</td>
            <td class="tol">${tolStr}</td>
            <td class="${r.pass?'pass':'fail'}">${r.pass?'✓ PASS':'✗ FAIL'}</td>
          </tr>`;
    }

    html += `</tbody></table>`;

    // Nota por grupo
    const notes = {
      A: 'VSOP87 185 términos (Tierra heliocéntrica → Sol geocéntrico). Rango de validez: 1800–2100 CE.',
      B: 'ELP/MPP02 (Chapront & Francou 2002, A&A 412) calibrado con LLR. 63× mejora en longitud vs ELP2000/Meeus Cap.47.',
      C: 'Mercurio: ecuación del centro Meeus Cap.31 (5 términos, e=0.206). Venus–Saturno: VSOP87 truncado Meeus App.II. Error sistemático ~0.11° = piso real del VSOP87 truncado.',
      D: 'IAU 1980, 63 series periódicas. Memoización con clave T (invalidación automática al cambiar el tiempo).',
      E: 'Newton-Raphson con convergencia < 1×10⁻⁹ rad. Fallback silencioso a casas iguales en latitudes polares > ±66.5°.',
      F: 'ΔT: tabla IERS 1620–2100 + interpolación lineal + polinomio de fallback. Nodos: Meeus Cap.47.7 con correcciones periódicas.',
      G: 'IAU 1955: 23.85282° + 0.013972°/año desde J2000.0. Verificado contra tablas publicadas de Lahiri.',
      H: 'Bisección sobre sunLonEcl() con paso inicial de 10 días. Error < 1 minuto vs JPL Horizons para los 4 eventos de 2025.',
      I: 'Nuevo en v2.1. vsop87Mercurio() usa ecuación del centro (no VSOP87) por alta excentricidad e=0.206. La inclinación orbital de 7° define el rango de β.',
    };

    if (notes[grp.id]) {
      html += `<div class="note">ℹ ${notes[grp.id]}</div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;

  // Resumen
  const pct  = Math.round(totalPass / (totalPass + totalFail) * 100);
  const ok   = totalFail === 0;
  document.getElementById('summary').innerHTML = `
    <div class="stat">
      <div class="n n-total">${totalPass + totalFail}</div>
      <div class="l">Tests</div>
    </div>
    <div class="stat">
      <div class="n n-pass">${totalPass}</div>
      <div class="l">Pasados</div>
    </div>
    <div class="stat">
      <div class="n n-fail">${totalFail}</div>
      <div class="l">Fallidos</div>
    </div>
    <div class="stat">
      <div class="n" style="color:${ok?'#4fffb0':'#ffcc44'}">${pct}%</div>
      <div class="l">Precisión</div>
    </div>
    <div class="verdict${ok?'':' bad'}">
      ${ok
        ? `✓ ${totalPass}/${totalPass+totalFail} PASS — Motor verificado`
        : `⚠ ${totalFail} test${totalFail>1?'s':''} requieren revisión`}
    </div>`;
}

// Ejecutar después de que AstroCore.js cargue
window.addEventListener('DOMContentLoaded', () => {
  try {
    renderResults();
  } catch(e) {
    document.getElementById('summary').innerHTML =
      `<span style="color:#ff6060">Error al cargar AstroCore.js: ${e.message}</span>`;
    console.error(e);
  }
});
</script>
</body>
</html>
